services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: recipe_db
    restart: always
    env_file:
      - .env.docker
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-recipe_password_123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-recipe_recommender}
      MYSQL_USER: ${MYSQL_USER:-recipe_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-recipe_pass}
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    command: --default-authentication-plugin=mysql_native_password --max_allowed_packet=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - recipe_network

  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recipe_backend
    restart: always
    env_file:
      - .env.docker
    environment:
      FLASK_ENV: ${FLASK_ENV}
      FLASK_APP: ${FLASK_APP}
      PORT: ${PORT}
      DEBUG: ${DEBUG}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      DB_NAME: ${DB_NAME}
      API_PREFIX: ${API_PREFIX:-/api}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ML_MODEL_LIMIT: ${ML_MODEL_LIMIT}
      ML_MAX_FEATURES: ${ML_MAX_FEATURES}
      ML_NGRAM_RANGE_MAX: ${ML_NGRAM_RANGE_MAX}
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE}
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend/data:/app/data
    networks:
      - recipe_network

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: recipe_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - recipe_network

volumes:
  mysql_data:
    driver: local

networks:
  recipe_network:
    driver: bridge
